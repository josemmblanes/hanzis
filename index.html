<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Hanzis · Repaso de vocabulario chino</title>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #1a0b2e, #2d1654, #190a35);
    color: #f0e8fe;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #app { width: 100%; max-width: 700px; display: flex; flex-direction: column; flex: 1; }

  .header {
    width: 100%;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);\n    border-bottom: 1px solid rgba(192,132,252,0.2);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .header h1 { font-size: 20px; font-weight: 700; color: #fff; text-shadow: 0 2px 10px rgba(168,85,247,0.4); }
  
  .back-btn {
    background: rgba(168, 85, 247, 0.2);
    border: 1px solid rgba(168, 85, 247, 0.4);
    color: #e9d5ff;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s ease;
  }
  .back-btn:hover {
    background: rgba(168, 85, 247, 0.4);
    color: #fff;
  }

  .main-content { padding: 20px; flex: 1; display: flex; flex-direction: column; width: 100%; }

  /* Menús de Selección (Curso y Tema) */
  .menu-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    animation: fadeIn 0.4s ease forwards;
  }
  .menu-title {
    font-size: 18px;
    color: #c084fc;
    margin-bottom: 24px;
    text-align: center;
    font-weight: 500;
  }
  .grid-menu {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    width: 100%;
    max-width: 440px;
  }
  .grid-menu .full-width {
    grid-column: span 2;
  }
  .menu-card {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(192, 132, 252, 0.15);
    border-radius: 16px;
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    backdrop-filter: blur(8px);
  }
  .menu-card:hover {
    background: rgba(168, 85, 247, 0.15);
    border-color: rgba(168, 85, 247, 0.5);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(168, 85, 247, 0.2);
  }
  .menu-card h2 { font-size: 22px; color: #fff; margin-bottom: 4px; }
  .menu-card p { font-size: 13px; color: #a78bfa; }

  /* Vista Principal de Estudio */
  .study-container { display: flex; flex-direction: column; flex: 1; width: 100%; }
  
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px;
    text-align: center;
  }
  .stat-val { font-size: 16px; font-weight: 700; color: #fff; }
  .stat-lbl { font-size: 11px; color: #a78bfa; margin-top: 2px; }

  /* Tarjeta de Carácter */
  .flashcard {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(192, 132, 252, 0.2);
    border-radius: 24px;
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    margin-bottom: auto;
  }
  .meta-tag {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(168,85,247,0.2);
    border: 1px solid rgba(168,85,247,0.4);
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    color: #e9d5ff;
  }
  
  #writer-target {
    width: 200px;
    height: 200px;
    background: rgba(255,255,255,0.02);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.05);
    margin: 20px 0;
    cursor: pointer;
  }

  .info-reveal-box { width: 100%; text-align: center; min-height: 90px; margin-top: 10px; }
  .pinyin-text { font-size: 22px; font-weight: 600; color: #38bdf8; margin-bottom: 6px; }
  .meaning-text { font-size: 16px; color: #e2e8f0; line-height: 1.4; padding: 0 10px; }
  
  .reveal-placeholder-btn {
    background: rgba(255,255,255,0.05);
    border: 1px dashed rgba(192, 132, 252, 0.4);
    color: #c084fc;
    padding: 14px;
    border-radius: 12px;
    width: 100%;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
  }
  .reveal-placeholder-btn:hover {
    background: rgba(168, 85, 247, 0.1);
    border-style: solid;
  }

  /* Botones de acción inferiores */
  .action-zone { width: 100%; margin-top: 24px; display: flex; flex-direction: column; gap: 12px; }
  .btn-row { display: flex; gap: 12px; width: 100%; }
  
  .btn {
    flex: 1;
    border: none;
    padding: 14px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-secondary { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
  .btn-secondary:hover { background: rgba(255,255,255,0.15); }
  
  .btn-success { background: #16a34a; color: #fff; box-shadow: 0 4px 14px rgba(22,163,74,0.4); }
  .btn-success:hover { background: #15803d; transform: translateY(-1px); }
  
  .btn-danger { background: #dc2626; color: #fff; box-shadow: 0 4px 14px rgba(220,38,38,0.4); }
  .btn-danger:hover { background: #b91c1c; transform: translateY(-1px); }

  /* Vista de Exploración */
  .browse-container { display: flex; flex-direction: column; flex: 1; width: 100%; }
  .search-box {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(192, 132, 252, 0.2);
    padding: 12px 16px;
    border-radius: 12px;
    color: #fff;
    font-size: 15px;
    margin-bottom: 16px;
    outline: none;
  }
  .search-box:focus { border-color: #a855f7; box-shadow: 0 0 0 2px rgba(168,85,247,0.2); }
  
  .words-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow-y: auto;
    max-height: calc(100vh - 180px);
    padding-right: 4px;
  }
  .word-row {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 14px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .word-row.reinforced {
    border-color: rgba(234,179,8,0.3);
    background: linear-gradient(90deg, rgba(234,179,8,0.03), transparent);
  }
  .word-left-block { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .word-top-meta { display: flex; align-items: center; gap: 12px; }
  .word-course-tag {
    font-size: 11px;
    background: rgba(255,255,255,0.1);
    padding: 2px 6px;
    border-radius: 6px;
    color: #cbd5e1;
  }
  .word-pinyin { font-size: 14px; color: #38bdf8; font-weight: 500; }
  .word-meaning { font-size: 13px; color: #94a3b8; line-height: 1.4; }
  
  .play-icon-btn {
    background: rgba(255,255,255,0.05);
    border: none;
    color: #fff;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: background 0.2s;
  }
  .play-icon-btn:hover { background: rgba(255,255,255,0.15); }
  .weight-badge {
    font-size: 11px;
    background: rgba(234,179,8,0.2);
    color: #fde047;
    border: 1px solid rgba(234,179,8,0.4);
    padding: 2px 6px;
    border-radius: 8px;
    margin-right: 8px;
  }
  .word-right-block { display: flex; align-items: center; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* Estilos para Hanzis coloreados según tono */
  .tone1 { color: #ff4d4d !important; }
  .tone2 { color: #22c55e !important; }
  .tone3 { color: #eab308 !important; }
  .tone4 { color: #3b82f6 !important; }
  .tone5 { color: #94a3b8 !important; }
</style>
</head>

  { "hanzi": "... ..." } // Asegúrate de rellenar con tu base de datos JSON unificada completa

const COURSE_LEVEL_LABELS = {
  "4上": "HSK 4 Superior (T1-T5)",
  "4下": "HSK 4 Inferior (T6-T10)",
  "all": "Todos los cursos"
};

// --- CONFIGURACIÓN DE TONOS ---
const PINYIN_TONE_MAP = [
  { re: /[āāáǎà]/i, t: 1 }, { re: /[ēēéěè]/i, t: 2 }, { re: /[īīíǐì]/i, t: 3 },
  { re: /[ōōóǒò]/i, t: 4 }, { re: /[ūūúǔù]/i, t: 5 }, { re: /[ǖǖǘǚǜ]/i, t: 6 }
];

function getToneFromPinyin(pinyinStr) {
  if (!pinyinStr) return 5;
  const clean = pinyinStr.trim().toLowerCase();
  if (/[āēīōūǖ]/i.test(clean)) return 1;
  if (/[áéíóúǘ]/i.test(clean)) return 2;
  if (/[ǎěǐǒǔǚ]/i.test(clean)) return 3;
  if (/[àèìòùǜ]/i.test(clean)) return 4;
  return 5;
}

// --- ESTADO GLOBAL ---
let state = {
  view: "SELECT_COURSE", // SELECT_COURSE, SELECT_TEMA, STUDY, BROWSE
  selectedCourse: null,  // "4上", "4下" o "all"
  selectedTema: null,    // "9", "10", o "all"
  words: [],             // Palabras filtradas bajo los criterios elegidos
  currentIndex: 0,
  isRevealed: false,
  browseSearch: "",
  weights: {}            // Guardará penalizaciones por fallos locales
};

let writerInstance = null;

// --- FUNCIONES AUXILIARES DE ELEMENTOS ---
function el(tag, attrs = {}, children = []) {
  const element = document.createElement(tag);
  for (let key in attrs) {
    if (key.startsWith("on")) {
      element.addEventListener(key.substring(2).toLowerCase(), attrs[key]);
    } else if (key === "class" && attrs[key]) {
      element.className = attrs[key];
    } else if (attrs[key] !== null && attrs[key] !== undefined) {
      element.setAttribute(key, attrs[key]);
    }
  }
  if (typeof children === "string") {
    element.textContent = children;
  } else if (Array.isArray(children)) {
    children.forEach(c => { if(c) element.appendChild(c); });
  }
  return element;
}

function coloredHanziEl(hanzi, explicitTone, fontSize = 70) {
  const container = el("div", { style: `display:flex; gap:2px; justify-content:center; font-size:${fontSize}px; font-weight:bold;` });
  for (let i = 0; i < hanzi.length; i++) {
    const char = hanzi[i];
    let t = explicitTone || 5;
    if (!explicitTone && state.words[state.currentIndex]) {
      const pinyinParts = state.words[state.currentIndex].pinyin.split(" ");
      if (pinyinParts[i]) t = getToneFromPinyin(pinyinParts[i]);
    }
    container.appendChild(el("span", { class: `tone${t}` }, char));
  }
  return container;
}

// --- LÓGICA DE NEGOCIO ---
function initApp() {
  render();
}

function selectCourse(course) {
  state.selectedCourse = course;
  state.view = "SELECT_TEMA";
  state.selectedTema = null;
  render();
}

function selectTema(tema) {
  state.selectedTema = tema;
  
  // Filtrar diccionario basado en curso Y tema elegido
  state.words = DATA_DICTIONARY.filter(w => {
    const matchCourse = (state.selectedCourse === "all" || w.curso === state.selectedCourse);
    const matchTema = (tema === "all" || w.tema === tema);
    return matchCourse && matchTema;
  });

  // Mezclar aleatoriamente el set de estudio inicial
  state.words.sort(() => Math.random() - 0.5);
  
  state.currentIndex = 0;
  state.isRevealed = false;
  state.weights = {};
  state.view = "STUDY";
  
  render();
  setTimeout(initWriter, 50);
}

function initWriter() {
  if (state.view !== "STUDY" || state.words.length === 0) return;
  const currentWord = state.words[state.currentIndex];
  
  document.getElementById("writer-target").innerHTML = "";
  
  writerInstance = HanziWriter.create('writer-target', currentWord.hanzi, {
    width: 200,
    height: 200,
    padding: 20,
    showOutline: true,
    strokeAnimationSpeed: 1.2,
    delayBetweenStrokes: 150,
    outlineColor: 'rgba(255,255,255,0.06)',
    strokeColor: '#c084fc'
  });
}

function handleReveal() {
  state.isRevealed = true;
  render();
  if (writerInstance) writerInstance.animateCharacter();
}

function handleAnswer(isCorrect) {
  const idx = state.currentIndex;
  if (!state.weights[idx]) state.weights[idx] = 1;

  if (isCorrect) {
    state.weights[idx] -= 1;
    if (state.weights[idx] <= 0) {
      // Correcto absoluto: avanza o termina ciclo
    }
  } else {
    state.weights[idx] += 2; // Penaliza inyectando repetición obligatoria al final
    const currentWord = state.words[idx];
    state.words.push({ ...currentWord }); // Duplica dinámicamente al final de la cola
  }

  if (state.currentIndex < state.words.length - 1) {
    state.currentIndex++;
    state.isRevealed = false;
    render();
    initWriter();
  } else {
    alert("¡Felicidades! Has completado todo el vocabulario seleccionado.");
    goBack();
  }
}

function speak(text) {
  if ('speechSynthesis' in window) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-CN';
    window.speechSynthesis.speak(utterance);
  }
}

function goBack() {
  if (state.view === "STUDY" || state.view === "BROWSE") {
    state.view = "SELECT_TEMA";
  } else if (state.view === "SELECT_TEMA") {
    state.view = "SELECT_COURSE";
  }
  render();
}

function switchView(targetView) {
  state.view = targetView;
  render();
  if (targetView === "STUDY") setTimeout(initWriter, 50);
}

// --- RENDERIZADO COMPLETO (VIRTUAL DOM MANUAL) ---
function render() {
  const root = document.getElementById("app");
  root.innerHTML = "";

  // 1. Cabecera Estática / Dinámica
  const headerLeftBtn = (state.view !== "SELECT_COURSE") 
    ? el("button", { class: "back-btn", onclick: goBack }, "← Volver") 
    : el("div");

  const headerRightBtn = (state.view === "STUDY")
    ? el("button", { class: "back-btn", onclick: () => switchView("BROWSE") }, "🔍 Lista")
    : (state.view === "BROWSE")
      ? el("button", { class: "back-btn", onclick: () => switchView("STUDY") }, "📖 Estudiar")
      : el("div");

  const header = el("div", { class: "header" }, [
    headerLeftBtn,
    el("h1", {}, "Hanzis \u00B7 \u7EC3\u4E60"),
    headerRightBtn
  ]);
  root.appendChild(header);

  const main = el("div", { class: "main-content" });

  // 2. Control de Vistas
  if (state.view === "SELECT_COURSE") {
    // --- MENÚ 1: SELECCIÓN DE CURSO ---
    const cursosDisponibles = ["4上", "4下", "all"];
    const grid = el("div", { class: "grid-menu" });
    
    cursosDisponibles.forEach(c => {
      const isAll = c === "all";
      const card = el("div", { 
        class: "menu-card" + (isAll ? " full-width" : ""),
        onclick: () => selectCourse(c) 
      }, [
        el("h2", {}, c === "all" ? "Todo" : `Curso ${c}`),
        el("p", {}, COURSE_LEVEL_LABELS[c] || "")
      ]);
      grid.appendChild(card);
    });

    main.appendChild(el("div", { class: "menu-container" }, [
      el("div", { class: "menu-title" }, "Selecciona el curso que deseas practicar"),
      grid
    ]));

  } else if (state.view === "SELECT_TEMA") {
    // --- MENÚ 2: SELECCIÓN DE TEMA (NUEVA FUNCIONALIDAD) ---
    // Extraer temas únicos disponibles basados en el curso seleccionado anteriormente
    const temasSet = new Set();
    DATA_DICTIONARY.forEach(w => {
      if (state.selectedCourse === "all" || w.curso === state.selectedCourse) {
        if (w.tema) temasSet.add(w.tema);
      }
    });
    
    const listaTemas = Array.from(temasSet).sort((a, b) => parseInt(a) - parseInt(b));
    const grid = el("div", { class: "grid-menu" });
    
    // Tarjeta para estudiar todos los temas juntos
    grid.appendChild(el("div", { class: "menu-card full-width", onclick: () => selectTema("all") }, [
      el("h2", {}, "Todos los temas"),
      el("p", {}, `Repasa el contenido completo del curso ${state.selectedCourse}`)
    ]));

    // Tarjetas individuales por cada tema extraído
    listaTemas.forEach(t => {
      const card = el("div", { class: "menu-card", onclick: () => selectTema(t) }, [
        el("h2", {}, `Tema ${t}`),
        el("p", {}, `Unidad estructurada ${t}`)
      ]);
      grid.appendChild(card);
    });

    main.appendChild(el("div", { class: "menu-container" }, [
      el("div", { class: "menu-title" }, `Curso ${state.selectedCourse === 'all' ? 'Completo' : state.selectedCourse} \u2192 Selecciona el Tema`),
      grid
    ]));

  } else if (state.view === "STUDY") {
    // --- VISTA DE ESTUDIO ---
    if (state.words.length === 0) {
      main.appendChild(el("div", { style: "text-align:center; padding:40px; color:#a78bfa;" }, "No hay vocabulario que coincida con la selección."));
    } else {
      const currentWord = state.words[state.currentIndex];
      
      // Barra de estado superior
      const stats = el("div", { class: "stats-bar" }, [
        el("div", { class: "stat-box" }, [el("div", { class: "stat-val" }, `${state.currentIndex + 1}/${state.words.length}`), el("div", { class: "stat-lbl" }, "Progreso")]),
        el("div", { class: "stat-box" }, [el("div", { class: "stat-val" }, state.selectedCourse.toUpperCase()), el("div", { class: "stat-lbl" }, "Curso")]),
        el("div", { class: "stat-box" }, [el("div", { class: "stat-val" }, state.selectedTema === "all" ? "Todos" : `T${state.selectedTema}`), el("div", { class: "stat-lbl" }, "Tema")]),
        el("div", { class: "stat-box" }, [el("div", { class: "stat-val" }, currentWord.level || "HSK"), el("div", { class: "stat-lbl" }, "Nivel")])
      ]);

      // Zona de revelado condicional (Pinyin + Significado)
      const infoBox = el("div", { class: "info-reveal-box" });
      if (state.isRevealed) {
        infoBox.appendChild(el("div", { class: "pinyin-text" }, currentWord.pinyin));
        infoBox.appendChild(el("div", { class: "meaning-text" }, currentWord.meaning));
      } else {
        infoBox.appendChild(el("button", { class: "reveal-placeholder-btn", onclick: handleReveal }, "Mostrar respuesta y trazos"));
      }

      // Zona de botones interactivos
      const actionZone = el("div", { class: "action-zone" });
      if (state.isRevealed) {
        actionZone.appendChild(el("div", { class: "btn-row" }, [
          el("button", { class: "btn btn-danger", onclick: () => handleAnswer(false) }, "❌ La fallé"),
          el("button", { class: "btn btn-success", onclick: () => handleAnswer(true) }, "✅ Acertada")
        ]));
      }
      actionZone.appendChild(el("button", { class: "btn btn-secondary", onclick: () => speak(currentWord.hanzi) }, "🔊 Escuchar Pronunciación"));

      const card = el("div", { class: "flashcard" }, [
        el("div", { class: "meta-tag" }, `Tema ${currentWord.tema || 'N/A'}`),
        el("div", { id: "writer-target", onclick: () => { if(writerInstance) writerInstance.animateCharacter(); } }),
        infoBox
      ]);

      main.appendChild(stats);
      main.appendChild(card);
      main.appendChild(actionZone);
    }

  } else if (state.view === "BROWSE") {
    // --- VISTA DE EXPLORACIÓN / DICCIONARIO ---
    const search = el("input", { 
      class: "search-box", 
      placeholder: "Buscar por hanzi, pinyin o significado...", 
      value: state.browseSearch,
      oninput: (e) => { state.browseSearch = e.target.value; render(); }
    });

    const q = state.browseSearch.toLowerCase();
    const filtered = state.words.filter(w =>
      w.hanzi.includes(state.browseSearch) ||
      w.pinyin.toLowerCase().includes(q) ||
      w.meaning.toLowerCase().includes(q)
    );

    const list = el("div", { class: "words-list" });
    filtered.forEach(word => {
      const idx = state.words.indexOf(word);
      const wgt = state.weights[idx] || 1;

      const row = el("div", { class: "word-row" + (wgt > 1 ? " reinforced" : "") }, [
        el("div", { class: "word-left-block" }, [
          el("div", { class: "word-top-meta" }, [
            el("div", { class: "word-course-tag" }, `T${word.tema}`),
            coloredHanziEl(word.hanzi, null, 24),
            el("div", { class: "word-pinyin" }, word.pinyin)
          ]),
          el("div", { class: "word-meaning" }, word.meaning)
        ]),
        el("div", { class: "word-right-block" }, [
          wgt > 1 ? el("span", { class: "weight-badge" }, "×" + wgt) : null,
          el("button", { class: "play-icon-btn", onclick: () => speak(word.hanzi) }, "🔊")
        ])
      ]);
      list.appendChild(row);
    });

    main.appendChild(search);
    main.appendChild(list);
  }

  root.appendChild(main);
}

// Inicializar la app al cargar la ventana
window.onload = initApp;
</script>
