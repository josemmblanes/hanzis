<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjetas Flash de Chino</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1a0633 0%, #3d1466 100%);
            min-height: 100vh;
            color: #f3f4f6;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .flashcard {
            perspective: 1000px;
        }
        .flashcard-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .flashcard.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }
        .flashcard-front, .flashcard-back {
            backface-visibility: hidden;
            border-radius: 1.5rem;
        }
        .flashcard-back {
            transform: rotateY(180deg);
        }
        /* Custom scrollbar para el menú lateral */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(26, 6, 51, 0.3);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(147, 51, 234, 0.5);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(147, 51, 234, 0.8);
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="sidebar" class="w-80 bg-[#140426]/90 backdrop-blur-md border-r border-purple-900/40 p-6 flex flex-col h-full z-20 transition-transform duration-300">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent flex items-center gap-2">
                <i data-lucide="languages" class="text-purple-400"></i> Hanzis
            </h1>
        </div>
        
        <div class="mb-6">
            <label class="text-xs font-semibold text-purple-300 uppercase tracking-wider block mb-2">Ficheros de Vocabulario</label>
            <div id="vocab-lists" class="space-y-2 overflow-y-auto flex-1 pr-1 max-h-[calc(100vh-200px)]">
                <div class="text-sm text-purple-300/70 p-3 italic">Buscando vocabularios...</div>
            </div>
        </div>

        <div class="mt-auto pt-4 border-t border-purple-950 text-center text-xs text-purple-400/50">
            v3.5 • Control de Velocidad Integrado
        </div>
    </div>

    <div class="flex-1 flex flex-col h-full relative">
        <header class="p-4 flex items-center justify-between md:justify-end border-b border-purple-900/20 bg-[#1a0633]/40 backdrop-blur-sm">
            <button id="toggle-sidebar" class="p-2 rounded-lg bg-purple-900/30 border border-purple-500/30 text-purple-300 hover:bg-purple-900/50 md:hidden">
                <i data-lucide="menu"></i>
            </button>
            <div class="text-sm text-purple-300 bg-purple-950/60 px-4 py-1.5 rounded-full border border-purple-800/30" id="current-list-indicator">
                Selecciona un nivel
            </div>
        </header>

        <main class="flex-1 flex flex-col items-center justify-center p-4 md:p-8 max-w-4xl mx-auto w-full">
            
            <div id="status-view" class="text-center p-8 max-w-md hidden">
                <div id="status-icon" class="mb-4 text-purple-400 flex justify-center"></div>
                <p id="status-message" class="text-lg text-purple-200 font-medium"></p>
            </div>

            <div id="flashcard-view" class="w-full flex flex-col items-center space-y-5 hidden">
                
                <div class="w-full flex justify-between items-center px-2 text-sm text-purple-300">
                    <span class="font-medium bg-purple-950/40 px-3 py-1 rounded-full border border-purple-900/30" id="card-counter">0 / 0</span>
                    <span class="text-xs uppercase tracking-wider text-purple-400 font-semibold" id="level-tag">HSK</span>
                </div>

                <div class="flashcard w-full aspect-[4/3] md:aspect-[16/10] max-h-[420px] cursor-pointer" onclick="toggleFlip()">
                    <div id="card-inner" class="flashcard-inner w-full h-full relative">
                        
                        <div class="flashcard-front absolute inset-0 bg-gradient-to-b from-[#250c46] to-[#16052b] border border-purple-500/20 shadow-2xl flex flex-col items-center justify-center p-6 text-center">
                            <span id="front-hanzi" class="text-7xl md:text-9xl font-bold text-transparent bg-clip-text bg-gradient-to-b from-teal-300 to-emerald-400 filter drop-shadow-[0_4px_12px_rgba(45,212,191,0.2)] mb-4"></span>
                            <span id="front-pinyin" class="text-2xl md:text-3xl font-medium text-purple-200 tracking-wide transition-opacity duration-200"></span>
                            <p class="text-xs text-purple-400/60 mt-8 absolute bottom-6 uppercase tracking-widest">Toca para ver el significado</p>
                        </div>

                        <div class="flashcard-back absolute inset-0 bg-gradient-to-b from-[#1e073b] to-[#0f021f] border border-purple-800/40 shadow-2xl flex flex-col items-center justify-center p-6 text-center">
                            <span id="back-translations" class="text-2xl md:text-4xl font-semibold text-purple-100 max-w-xl leading-relaxed"></span>
                            <p class="text-xs text-purple-500/60 mt-8 absolute bottom-6 uppercase tracking-widest">Toca para volver al carácter</p>
                        </div>

                    </div>
                </div>

                <div class="w-full flex items-center justify-between gap-4 bg-purple-950/20 border border-purple-900/30 p-3.5 rounded-2xl">
                    <span class="text-sm text-purple-300 font-medium flex items-center gap-1.5 select-none">
                        <i data-lucide="gauge" class="w-4 h-4 text-purple-400"></i> Velocidad:
                    </span>
                    <div class="flex items-center gap-3 flex-1 max-w-[240px]">
                        <input type="range" id="voice-speed" min="0.5" max="1" step="0.05" value="0.70" class="w-full h-1.5 bg-purple-900 rounded-lg appearance-none cursor-pointer accent-purple-500">
                        <span id="speed-value" class="text-xs text-purple-300 bg-purple-900/50 px-2 py-0.5 rounded-md font-mono select-none">0.70x</span>
                    </div>
                </div>

                <div class="w-full flex flex-col sm:flex-row items-center gap-4 pt-1">
                    
                    <button onclick="playCurrentAudio(event)" class="w-full sm:w-auto flex-1 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-semibold py-4 px-6 rounded-2xl shadow-lg shadow-purple-950/50 flex items-center justify-center gap-3 active:scale-[0.98] transition-all border border-purple-400/20 group">
                        <i data-lucide="volume-2" class="w-5 h-5 animate-pulse group-hover:scale-110 transition-transform"></i>
                        <span>Escuchar</span>
                    </button>

                    <button onclick="togglePinyin(event)" id="btn-pinyin" class="w-full sm:w-auto px-6 py-4 rounded-2xl bg-purple-950/40 hover:bg-purple-900/40 border border-purple-800/40 text-purple-300 font-medium text-sm flex items-center justify-center gap-2 transition-all">
                        <i data-lucide="eye-off" class="w-4 h-4"></i>
                        <span>Ocultar Pinyin</span>
                    </button>

                    <div class="flex items-center gap-3 w-full sm:w-auto">
                        <button onclick="navigateCard(-1, event)" class="flex-1 sm:flex-none p-4 rounded-2xl bg-purple-900/20 hover:bg-purple-900/40 border border-purple-800/30 text-purple-300 transition-all flex justify-center active:scale-95">
                            <i data-lucide="arrow-left" class="w-6 h-6"></i>
                        </button>
                        <button onclick="navigateCard(1, event)" class="flex-1 sm:flex-none p-4 rounded-2xl bg-purple-900/20 hover:bg-purple-900/40 border border-purple-800/30 text-purple-300 transition-all flex justify-center active:scale-95">
                            <i data-lucide="arrow-right" class="w-6 h-6"></i>
                        </button>
                    </div>

                </div>

            </div>
        </main>
    </div>

    <script>
        const availableFiles = ['HSK1.json', 'HSK2.json', 'HSK3_1.json', 'HSK3_2.json', 'HSK4_1.json', 'HSK4_2.json', 'HSK4_3.json'];
        
        let currentVocabulary = [];
        let currentIndex = 0;
        let isFlipped = false;
        let showPinyin = true;

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            buildSidebarMenu();
            initMobileSidebar();
            initSpeedSlider();
            
            loadVocabularyFile(availableFiles[0]);
        });

        // Escuchar cambios en la barra para cambiar el texto del indicador (ej: 0.75x)
        function initSpeedSlider() {
            const slider = document.getElementById('voice-speed');
            const display = document.getElementById('speed-value');
            if (slider && display) {
                slider.addEventListener('input', (e) => {
                    display.innerText = parseFloat(e.target.value).toFixed(2) + 'x';
                });
            }
        }

        function buildSidebarMenu() {
            const container = document.getElementById('vocab-lists');
            container.innerHTML = '';

            availableFiles.forEach(file => {
                const displayName = file.replace('.json', '').replace('_', ' ');
                const button = document.createElement('button');
                button.className = "vocab-btn w-full text-left p-3.5 rounded-xl text-sm font-medium transition-all flex items-center justify-between group bg-purple-950/20 text-purple-300 hover:bg-purple-900/30 border border-purple-900/30";
                button.setAttribute('data-file', file);
                button.innerHTML = `
                    <span class="flex items-center gap-2.5">
                        <i data-lucide="book-open" class="w-4 h-4 text-purple-400 group-hover:text-purple-300"></i>
                        ${displayName}
                    </span>
                    <i data-lucide="chevron-right" class="w-4 h-4 opacity-0 -translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all text-purple-400"></i>
                `;
                button.onclick = () => {
                    document.querySelectorAll('.vocab-btn').forEach(btn => {
                        btn.classList.remove('bg-purple-600', 'text-white', 'border-purple-400/30');
                        btn.classList.add('bg-purple-950/20', 'text-purple-300', 'border-purple-900/30');
                    });
                    button.classList.remove('bg-purple-950/20', 'text-purple-300', 'border-purple-900/30');
                    button.classList.add('bg-purple-600', 'text-white', 'border-purple-400/30');
                    
                    loadVocabularyFile(file);
                    
                    if (window.innerWidth < 768) {
                        document.getElementById('sidebar').classList.add('-translate-x-full');
                    }
                };
                container.appendChild(button);
            });
            lucide.createIcons();
        }

        async function loadVocabularyFile(fileName) {
            showStatus('loader', 'Cargando vocabulario...');
            try {
                const response = await fetch(`/data/${fileName}`);
                if (!response.ok) throw new Error(`Status ${response.status}`);
                
                const data = await response.json();
                if (!Array.isArray(data) || data.length === 0) throw new Error('El archivo está vacío');
                
                currentVocabulary = data;
                currentIndex = 0;
                isFlipped = false;
                
                document.getElementById('level-tag').innerText = fileName.replace('.json', '').replace('_', ' ');
                document.getElementById('current-list-indicator').innerText = `Estudiando: ${fileName.replace('.json', '').replace('_', ' ')}`;
                
                hideStatus();
                renderCard();
                
                document.querySelectorAll('.vocab-btn').forEach(btn => {
                    if(btn.getAttribute('data-file') === fileName) {
                        btn.classList.remove('bg-purple-950/20', 'text-purple-300', 'border-purple-900/30');
                        btn.classList.add('bg-purple-600', 'text-white', 'border-purple-400/30');
                    }
                });

            } catch (error) {
                console.error("Error al cargar el fichero:", error);
                showStatus('alert-circle', `No se pudo cargar ningún fichero de vocabulario. Revisa que existan en /data/ y que los nombres coincidan exactamente.`);
            }
        }

        function renderCard() {
            if (currentVocabulary.length === 0) return;
            const item = currentVocabulary[currentIndex];

            isFlipped = false;
            document.getElementById('card-inner').classList.remove('flipped');

            document.getElementById('front-hanzi').innerText = item.hanzi || '';
            document.getElementById('front-pinyin').innerText = item.pinyin || '';
            document.getElementById('front-pinyin').style.opacity = showPinyin ? '1' : '0';
            
            const translations = Array.isArray(item.translations) ? item.translations.join(', ') : (item.translations || item.translation || '');
            document.getElementById('back-translations').innerText = translations;

            document.getElementById('card-counter').innerText = `${currentIndex + 1} / ${currentVocabulary.length}`;
            
            setTimeout(() => { playCurrentAudio(); }, 120);
        }

        function toggleFlip() {
            isFlipped = !isFlipped;
            const inner = document.getElementById('card-inner');
            if (isFlipped) {
                inner.classList.add('flipped');
            } else {
                inner.classList.remove('flipped');
            }
        }

        document.getElementById('card-inner')?.addEventListener('click', (e) => {
            // Evitar que el clic en botones propague el giro
            if (e.target.closest('button') || e.target.closest('input')) e.stopPropagation();
        });

        function navigateCard(direction, event) {
            if (event) event.stopPropagation();
            if (currentVocabulary.length === 0) return;

            currentIndex += direction;
            if (currentIndex >= currentVocabulary.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = currentVocabulary.length - 1;

            renderCard();
        }

        function togglePinyin(event) {
            if (event) event.stopPropagation();
            showPinyin = !showPinyin;
            
            const pinyinEl = document.getElementById('front-pinyin');
            const btn = document.getElementById('btn-pinyin');
            
            if (showPinyin) {
                pinyinEl.style.opacity = '1';
                btn.innerHTML = `<i data-lucide="eye-off" class="w-4 h-4"></i> <span>Ocultar Pinyin</span>`;
            } else {
                pinyinEl.style.opacity = '0';
                btn.innerHTML = `<i data-lucide="eye" class="w-4 h-4"></i> <span>Mostrar Pinyin</span>`;
            }
            lucide.createIcons();
        }

        /* ============================================================
           SÍNTESIS DE VOZ NATIVA CON CONTROL DE VELOCIDAD DINÁMICO
           ============================================================ */
        function playCurrentAudio(event) {
            if (event) event.stopPropagation();
            if (currentVocabulary.length === 0) return;

            const text = currentVocabulary[currentIndex].hanzi;
            if (!text) return;

            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
            }

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "zh-CN"; 

            // Leer de forma dinámica la posición actual del selector deslizante
            const speedSlider = document.getElementById('voice-speed');
            utterance.rate = speedSlider ? parseFloat(speedSlider.value) : 0.70; 

            if (window.speechSynthesis.getVoices) {
                const voices = window.speechSynthesis.getVoices();
                const bestVoice = voices.find(v => v.lang.includes("zh-CN") && 
                    (v.name.includes("Google") || v.name.includes("Premium") || v.name.includes("Microsoft") || v.name.includes("Tingting"))
                );
                
                if (bestVoice) {
                    utterance.voice = bestVoice;
                } else {
                    utterance.voice = voices.find(v => v.lang.includes("zh-CN"));
                }
            }

            utterance.onerror = (e) => {
                console.warn("Aviso SpeechSynthesis:", e.error);
            };

            window.speechSynthesis.speak(utterance);
        }

        if (window.speechSynthesis && window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = () => {};
        }

        function showStatus(iconName, message) {
            document.getElementById('flashcard-view').classList.add('hidden');
            const statusView = document.getElementById('status-view');
            statusView.classList.remove('hidden');
            
            document.getElementById('status-icon').innerHTML = iconName === 'loader' 
                ? `<div class="w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>`
                : `<i data-lucide="${iconName}" class="w-16 h-16 text-purple-400"></i>`;
                
            document.getElementById('status-message').innerText = message;
            lucide.createIcons();
        }

        function hideStatus() {
            document.getElementById('status-view').classList.add('hidden');
            document.getElementById('flashcard-view').classList.remove('hidden');
        }

        function initMobileSidebar() {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.getElementById('toggle-sidebar');
            
            if (window.innerWidth < 768) {
                sidebar.classList.add('absolute', '-translate-x-full');
            }

            toggle.addEventListener('click', (e) => {
                e.stopPropagation();
                sidebar.classList.toggle('-translate-x-full');
            });

            document.addEventListener('click', (e) => {
                if (window.innerWidth < 768 && !sidebar.contains(e.target) && !toggle.contains(e.target)) {
                    sidebar.classList.add('-translate-x-full');
                }
            });
        }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('flashcard-view').classList.contains('hidden')) return;
            
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                toggleFlip();
            } else if (e.key === 'ArrowLeft') {
                navigateCard(-1);
            } else if (e.key === 'ArrowRight') {
                navigateCard(1);
            } else if (e.key === 'v' || e.key === 'V') {
                playCurrentAudio();
            }
        });
    </script>
</body>
</html>
