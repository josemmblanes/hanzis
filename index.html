<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Hanzis · Repaso de vocabulario chino</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #1a0b2e, #2d1654, #190a35);
    color: #f0e8fe;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #app { width: 100%; max-width: 700px; display: flex; flex-direction: column; flex: 1; }

  .header {
    width: 100%;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(192,132,252,0.2);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .header h1 { font-size: 20px; font-weight: 700; color: #fff; text-shadow: 0 2px 10px rgba(168,85,247,0.4); }
  
  .back-btn {
    background: rgba(168, 85, 247, 0.2);
    border: 1px solid rgba(168, 85, 247, 0.4);
    color: #e9d5ff;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s ease;
  }
  .back-btn:hover {
    background: rgba(168, 85, 247, 0.4);
    color: #fff;
  }

  .main-content { padding: 20px; flex: 1; display: flex; flex-direction: column; width: 100%; }

  /* Grid de selección */
  .grid-menu {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    width: 100%;
    margin-bottom: 24px;
  }
  .grid-menu .full-width {
    grid-column: span 2;
  }
  .menu-card {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(192, 132, 252, 0.15);
    border-radius: 16px;
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    backdrop-filter: blur(8px);
  }
  .menu-card:hover {
    background: rgba(168, 85, 247, 0.1);
    border-color: rgba(168, 85, 247, 0.4);
    transform: translateY(-2px);
  }
  .menu-card.selected {
    background: rgba(168, 85, 247, 0.25);
    border-color: #c084fc;
    box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
  }
  .menu-card h2 { font-size: 22px; color: #fff; margin-bottom: 4px; }
  .menu-card p { font-size: 13px; color: #a78bfa; }

  /* Vista de estudio */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px;
    text-align: center;
  }
  .stat-val { font-size: 16px; font-weight: 700; color: #fff; }
  .stat-lbl { font-size: 11px; color: #a78bfa; margin-top: 2px; }

  .flashcard {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(192, 132, 252, 0.2);
    border-radius: 24px;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    margin-bottom: auto;
  }
  
  #writer-target {
    width: 200px;
    height: 200px;
    background: rgba(255,255,255,0.02);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.05);
    margin-bottom: 30px;
    cursor: pointer;
  }

  .info-reveal-box { width: 100%; text-align: center; min-height: 100px; }
  .pinyin-text { font-size: 26px; font-weight: 600; color: #38bdf8; margin-bottom: 8px; }
  .meaning-text { font-size: 18px; color: #e2e8f0; line-height: 1.4; padding: 0 10px; }
  
  .reveal-placeholder-btn {
    background: rgba(255,255,255,0.05);
    border: 1px dashed rgba(192, 132, 252, 0.4);
    color: #c084fc;
    padding: 20px;
    border-radius: 16px;
    width: 100%;
    cursor: pointer;
    font-size: 15px;
    transition: all 0.2s;
  }
  .reveal-placeholder-btn:hover {
    background: rgba(168, 85, 247, 0.1);
    border-style: solid;
  }

  .action-zone { width: 100%; margin-top: 24px; display: flex; flex-direction: column; gap: 12px; }
  .btn-row { display: flex; gap: 12px; width: 100%; }
  
  .btn {
    flex: 1;
    border: none;
    padding: 16px;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-primary { background: #a855f7; color: #fff; box-shadow: 0 4px 14px rgba(168,85,247,0.4); }
  .btn-primary:hover { background: #9333ea; transform: translateY(-1px); }
  .btn-primary:disabled { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); box-shadow: none; cursor: not-allowed; }
  
  .btn-secondary { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
  .btn-secondary:hover { background: rgba(255,255,255,0.15); }
  
  .btn-success { background: #16a34a; color: #fff; box-shadow: 0 4px 14px rgba(22,163,74,0.4); }
  .btn-success:hover { background: #15803d; transform: translateY(-1px); }
  
  .btn-danger { background: #dc2626; color: #fff; box-shadow: 0 4px 14px rgba(220,38,38,0.4); }
  .btn-danger:hover { background: #b91c1c; transform: translateY(-1px); }

  /* Vista lista */
  .search-box {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(192, 132, 252, 0.2);
    padding: 14px 16px;
    border-radius: 14px;
    color: #fff;
    font-size: 16px;
    margin-bottom: 16px;
    outline: none;
  }
  .search-box:focus { border-color: #a855f7; box-shadow: 0 0 0 2px rgba(168,85,247,0.2); }
  
  .words-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
    max-height: calc(100vh - 180px);
    padding-right: 4px;
  }
  .word-row {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .word-row.reinforced {
    border-color: rgba(234,179,8,0.3);
    background: linear-gradient(90deg, rgba(234,179,8,0.03), transparent);
  }
  .word-left-block { display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .word-top-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .word-course-tag {
    font-size: 12px;
    background: rgba(255,255,255,0.1);
    padding: 3px 8px;
    border-radius: 8px;
    color: #cbd5e1;
  }
  .word-pinyin { font-size: 15px; color: #38bdf8; font-weight: 500; }
  .word-meaning { font-size: 14px; color: #94a3b8; line-height: 1.4; }
  
  .play-icon-btn {
    background: rgba(255,255,255,0.05);
    border: none;
    color: #fff;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: background 0.2s;
  }
  .play-icon-btn:hover { background: rgba(255,255,255,0.15); }
  .weight-badge {
    font-size: 12px;
    background: rgba(234,179,8,0.2);
    color: #fde047;
    border: 1px solid rgba(234,179,8,0.4);
    padding: 3px 8px;
    border-radius: 10px;
    margin-right: 12px;
  }
  .word-right-block { display: flex; align-items: center; }

  /* Colores de tonos */
  .tone1 { color: #ff4d4d !important; }
  .tone2 { color: #22c55e !important; }
  .tone3 { color: #eab308 !important; }
  .tone4 { color: #3b82f6 !important; }
  .tone5 { color: #94a3b8 !important; }
</style>
</head>

// --- UTILIDADES ELEMENTOS DOM ---
function el(tag, attrs = {}, children = []) {
  const element = document.createElement(tag);
  for (let key in attrs) {
    if (key.startsWith("on")) {
      element.addEventListener(key.substring(2).toLowerCase(), attrs[key]);
    } else if (key === "class" && attrs[key]) {
      element.className = attrs[key];
    } else if (attrs[key] !== null && attrs[key] !== undefined) {
      element.setAttribute(key, attrs[key]);
    }
  }
  if (typeof children === "string") {
    element.textContent = children;
  } else if (Array.isArray(children)) {
    children.forEach(c => { if(c) element.appendChild(c); });
  }
  return element;
}

function coloredHanziEl(hanzi, explicitTone, fontSize = 70) {
  const container = el("div", { style: `display:flex; gap:4px; justify-content:center; font-size:${fontSize}px; font-weight:bold;` });
  for (let i = 0; i < hanzi.length; i++) {
    const char = hanzi[i];
    let t = explicitTone || 5;
    if (!explicitTone && state.words[state.currentIndex]) {
      t = state.words[state.currentIndex].tone || 5;
    }
    container.appendChild(el("span", { class: `tone${t}` }, char));
  }
  return container;
}

// --- FLUJO Y LÓGICA DE NEGOCIO ---
function toggleCourseSelection(courseKey) {
  const idx = state.selectedCourses.indexOf(courseKey);
  if (idx > -1) {
    state.selectedCourses.splice(idx, 1);
  } else {
    state.selectedCourses.push(courseKey);
  }
  render();
}

// Pasa de la pantalla de cursos a la pantalla de selección de temas
function goToTopicSelection() {
  if (state.selectedCourses.length === 0) return;
  state.view = "SELECT_TOPIC";
  state.selectedTopic = "all"; // Reiniciar por defecto
  render();
}

// Pasa de la selección de temas al inicio del juego/estudio
function startStudy(topicKey) {
  state.selectedTopic = topicKey;

  // Filtrar vocabulario por Cursos seleccionados Y Tema seleccionado
  state.words = DATA_DICTIONARY.filter(item => {
    const matchesCourse = state.selectedCourses.includes(item._course);
    const matchesTopic = (topicKey === "all" || item.tema === topicKey);
    return matchesCourse && matchesTopic;
  });

  // Mezclar aleatoriamente el set filtrado
  state.words.sort(() => Math.random() - 0.5);

  state.currentIndex = 0;
  state.isRevealed = false;
  state.weights = {};
  state.view = "STUDY";
  
  render();
  setTimeout(initWriter, 50);
}

  if (state.view !== "STUDY" || state.words.length === 0) return;
  const currentWord = state.words[state.currentIndex];
  
  document.getElementById("writer-target").innerHTML = "";
